name: expiry-notification-system

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expiry_notification}
      POSTGRES_USER: ${POSTGRES_USER:-expiry_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expiry_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-expiry_app}:${POSTGRES_PASSWORD:-expiry_dev_password}@db:5432/${POSTGRES_DB:-expiry_notification}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    environment:
      APP_NAME: ${APP_NAME:-Expiry Notification API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-expiry_app}:${POSTGRES_PASSWORD:-expiry_dev_password}@db:5432/${POSTGRES_DB:-expiry_notification}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-30}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://localhost:8081/realms/expiry-notification}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-expiry-notification-web}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-http://keycloak:8080/realms/expiry-notification/protocol/openid-connect/certs}
      OIDC_ALGORITHMS: ${OIDC_ALGORITHMS:-RS256}
      OIDC_JWKS_CACHE_SECONDS: ${OIDC_JWKS_CACHE_SECONDS:-300}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://localhost:8080}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-oidc}
        VITE_OIDC_API_TOKEN: ${VITE_OIDC_API_TOKEN:-id_token}
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-http://localhost:8081/realms/expiry-notification}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-expiry-notification-web}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-http://localhost:8080/auth/callback}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${VITE_OIDC_POST_LOGOUT_REDIRECT_URI:-http://localhost:8080/}
        VITE_OIDC_SCOPE: ${VITE_OIDC_SCOPE:-openid profile email}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    environment:
      APP_ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://expiry_test:expiry_test_password@test-db:5432/expiry_notification_test
    command: ["python", "-m", "pytest", "-q", "-p", "no:cacheprovider"]
    depends_on:
      test-migrate:
        condition: service_completed_successfully
    restart: "no"

  test-db:
    profiles: ["test"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expiry_notification_test
      POSTGRES_USER: expiry_test
      POSTGRES_PASSWORD: expiry_test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U expiry_test -d expiry_notification_test
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s
    restart: "no"

  test-migrate:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://expiry_test:expiry_test_password@test-db:5432/expiry_notification_test
    depends_on:
      test-db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  keycloak_data:
