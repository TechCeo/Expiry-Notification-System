name: Integration CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: integration-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose-integration:
    name: Docker Compose integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose configuration
        run: docker compose --profile test config --quiet

      - name: Run integration test environment
        run: docker compose --profile test run --build --rm test

      - name: Tear down integration environment
        if: always()
        run: docker compose --profile test down --volumes --remove-orphans
