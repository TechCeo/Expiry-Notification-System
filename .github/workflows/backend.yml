name: Backend CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Lint and test backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: expiry_notification_test
          POSTGRES_USER: expiry_test
          POSTGRES_PASSWORD: expiry_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expiry_test -d expiry_notification_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://expiry_test:expiry_test_password@localhost:5432/expiry_notification_test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend linting
        run: ruff check --output-format=github app tests alembic

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run backend tests with coverage
        run: >
          pytest
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          -q
          -p no:cacheprovider

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore
